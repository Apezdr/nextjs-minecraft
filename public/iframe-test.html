<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;background:transparent;">
<head><meta charset="utf-8"><title>iframe z-index test</title></head>
<body style="margin:0;padding:0;background:transparent;font-family:monospace;">

  <!-- Layer stack (no negative z-index): -->
  <!-- z=0: iframe -->
  <!-- z=1: dark overlay -->
  <!-- z=2: content -->

  <iframe
    id="bg"
    src="http://192.168.1.39:8100/#world:201:48:-131:132:0.75:0.97:0:0:perspective"
    style="position:fixed;inset:0;width:100%;height:100%;border:none;z-index:0;pointer-events:none;"
  ></iframe>

  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1;pointer-events:none;"></div>

  <div style="position:relative;z-index:2;padding:2rem;color:white;">
    <h1>z-index test</h1>
    <p>If you can see the 3D perspective map behind this text, the layering works.</p>
    <p>If you see a flat/zoomed-out map, it is a BlueMap hash-parsing issue, not z-index.</p>
  </div>

</body>
</html>
